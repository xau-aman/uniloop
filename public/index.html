<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F5F0E8" />
    <meta name="description" content="UniLoop — Student Club & Event Hub" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect for faster external resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Preload the font -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <title>UniLoop</title>

    <!-- Inline critical CSS: instant dark bg + loader so no white flash -->
    <style>
      body { margin: 0; background: #F5F0E8; transition: background-color 0.4s ease; }
      [data-theme="dark"] body, html[data-theme="dark"] body { background: #121218; }
      #root { min-height: 100vh; }
      .page-loader {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(44,24,16,0.1);
        border-top-color: #7B2D8E;
        border-radius: 50%;
        animation: sp .6s linear infinite;
        display: inline-block;
      }
      [data-theme="dark"] .auth-spinner {
        border-color: rgba(255,255,255,0.1);
        border-top-color: #A855F7;
      }
      @keyframes sp { to { transform: rotate(360deg); } }
      /* Prevent flash: apply saved theme instantly */
    </style>
    <script>
      (function(){
        var t = localStorage.getItem('cc_theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
